version = 1
requires-python = ">=3.10"

[[package]]
name = "code-debug-env"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "fastapi" },
  { name = "uvicorn", extra = ["standard"] },
  { name = "pydantic" },
  { name = "pyyaml" },
  { name = "openai" },
  { name = "requests" },
  { name = "openenv-core" },
]

[[package]]
name = "fastapi"
version = "0.111.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.30.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.7.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyyaml"
version = "6.0.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.30.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.3"
source = { registry = "https://pypi.org/simple" }
